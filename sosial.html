<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desain Media Sosial - FX.DESIGN</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --fg: #f7f7f7;
      --accent: #ffffff;
      --muted: #b3b3b3;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
                  radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 25%),
                  var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    .container {
      width: min(1140px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 2.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-logo {
      display: block;
      max-height: 2.5rem;
      width: auto;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 1rem;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    .hero {
      padding: 2.5rem 0;
    }

    .hero-title {
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      line-height: 0.95;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
      color: var(--accent);
    }

    .hero-text {
      max-width: 42rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .card {
      padding: 1.6rem;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      box-shadow: 0 24px 40px rgba(0,0,0,0.18);
      margin-top: 1.5rem;
    }

    .card h3 {
      margin-bottom: 1rem;
      font-size: 1.3rem;
    }

    .card img {
      width: 726.93px;
      height: 555.97px;
      object-fit: cover;
      border-radius: 20px;
      display: block;
      margin: 1rem auto;
    }

    .button,
    .button.secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
      text-decoration: none;
    }

    .button {
      background: var(--accent);
      color: var(--bg);
    }

    .button:hover,
    .button.secondary:hover {
      transform: translateY(-2px);
    }

    .button.secondary {
      background: transparent;
      color: var(--fg);
      border-color: var(--border);
    }

    footer {
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 840px) {
      header { flex-direction: column; align-items: flex-start; }
      footer { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="brand" href="index.html">
        <img src="https://h.top4top.io/p_3761gvfn21.png" alt="logo with name" class="brand-logo" />
      </a>
      <nav>
        <a href="index.html#services">Layanan</a>
        <a href="index.html#portfolio">Portofolio</a>
        <a href="index.html#contact">Kontak</a>
      </nav>
    </header>

    <section class="hero">
      <h1 class="hero-title">Desain Media Sosial</h1>
      <p class="hero-text">Desain visual untuk platform media sosial Anda.</p>
      <article class="card">
        <h3>Portofolio Desain</h3>
        <img src="https://f.top4top.io/p_3786dse2g1.png" alt="Portofolio Desain Sosial" />
        <a href="index.html" class="button secondary">Kembali ke Beranda</a>
      </article>
    </section>

    <footer>
       <div>
         <strong>FX.DESIGN</strong>
         <p>Effect to FX</p>
         <p>Copyright © 2026 FX.DESIGN. All rights reserved.</p>
       </div>
       <div>
         <p>Instagram: @fx.design0</p>
         <p>Tiktok: @fx.design0</p>
         <p>Whats App: +62 895 3830 98720</p>
       </div>
    </footer>
  </div>
</body>
</html>
